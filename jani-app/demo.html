<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>자니..? 데모</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #1a1a2e;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Noto Sans KR', sans-serif;
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 75% 5%, rgba(232,160,160,0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 15% 90%, rgba(184,168,212,0.05) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

/* DEVICE */
.device {
  position: relative;
  z-index: 1;
  width: 390px;
  height: 780px;
  border-radius: 0px;
  overflow: hidden;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.07), 0 40px 100px rgba(0,0,0,0.8);
  background: #0d0d12;
}

.device::before {
  content: '';
  position: absolute;
  top: 0; left: 50%;
  transform: translateX(-50%);
  width: 120px; height: 8px;
  background: rgba(255,255,255,0.06);
  border-radius: 0 0 10px 10px;
  z-index: 99;
}

.stage { display: none; width: 100%; height: 100%; flex-direction: column; }
.stage.active { display: flex; }


/* ══════════════════════════════════════
   S1  온보딩
══════════════════════════════════════ */
#s1 { background: #0d0d12; }

.s1-inner {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 0 32px;
}

.s1-logo {
  font-size: 34px;
  font-weight: 300;
  font-style: italic;
  color: #e8a0a0;
  letter-spacing: -0.02em;
  margin-bottom: 28px;
}

.s1-title {
  font-size: 20px;
  font-weight: 300;
  color: rgba(255,255,255,0.88);
  text-align: center;
  line-height: 1.65;
  margin-bottom: 36px;
}

.s1-tabs {
  display: flex;
  width: 100%;
  background: rgba(255,255,255,0.05);
  border-radius: 12px;
  padding: 4px;
  margin-bottom: 16px;
}

.s1-tab {
  flex: 1;
  padding: 10px;
  text-align: center;
  font-size: 13px;
  font-family: 'Noto Sans KR', sans-serif;
  border-radius: 9px;
  cursor: pointer;
  color: rgba(255,255,255,0.38);
  user-select: none;
  transition: all 0.2s;
}
.s1-tab.on { background: #1a1825; color: #fff; font-weight: 500; }

.s1-input {
  width: 100%;
  padding: 14px 16px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  color: #fff;
  font-size: 14px;
  font-family: 'Noto Sans KR', sans-serif;
  outline: none;
  transition: border-color 0.2s;
  margin-bottom: 12px;
}
.s1-input:focus { border-color: rgba(232,160,160,0.55); }
.s1-input::placeholder { color: rgba(255,255,255,0.28); }

.s1-btn {
  width: 100%;
  padding: 15px;
  background: #e8a0a0;
  color: #0d0d12;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 15px;
  font-weight: 700;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  transition: background 0.2s;
}
.s1-btn:hover { background: #f0b0b0; }
.s1-btn:active { transform: scale(0.98); }


/* ══════════════════════════════════════
   S2  채팅 목록 (카카오톡)
══════════════════════════════════════ */
#s2 { background: #f7f7f7; flex-direction: row; }

.kk-sidebar {
  width: 52px;
  background: #f0eff4;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 58px;
  gap: 4px;
  flex-shrink: 0;
}

.sb-item {
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 12px;
  font-size: 19px;
  cursor: pointer;
}
.sb-item.on { background: rgba(0,0,0,0.07); }

.kk-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.kk-top {
  background: #fff;
  padding: 52px 14px 0;
  border-bottom: 1px solid #e8e8e8;
  flex-shrink: 0;
}

.kk-top-row {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  padding-bottom: 10px;
}

.kk-heading { font-size: 20px; font-weight: 700; color: #111; }

.kk-icons { display: flex; gap: 12px; align-items: center; padding-bottom: 2px; }

.kk-tabs { display: flex; }
.kk-tab {
  padding: 8px 14px 10px;
  font-size: 13px;
  font-weight: 700;
  color: #bbb;
  position: relative;
}
.kk-tab.on { color: #111; }
.kk-tab.on::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 2.5px;
  background: #111;
  border-radius: 2px 2px 0 0;
}

.room-list { flex: 1; overflow-y: auto; }

.room-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: #fff;
  border-bottom: 1px solid #f0f0f0;
  cursor: default;
}
.room-row.tappable { cursor: pointer; }
.room-row.tappable:active { background: #f5f5f5; }
.room-row.protected-row { background: #fff5f5; }

.rm-avatar {
  width: 46px; height: 46px;
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px;
  flex-shrink: 0;
}
.av-blue  { background: #d6eaf8; }
.av-peach { background: #fde8d8; }
.av-pink  { background: #fde0e0; }

.rm-info { flex: 1; min-width: 0; }

.rm-name-row {
  display: flex;
  align-items: center;
  gap: 5px;
  margin-bottom: 3px;
}
.rm-name { font-size: 14px; font-weight: 700; color: #111; }

.warn-badge {
  font-size: 10px;
  font-weight: 500;
  background: rgba(255,140,0,0.1);
  color: #e08000;
  border: 1px solid rgba(255,140,0,0.22);
  padding: 1px 6px;
  border-radius: 100px;
}

.rm-preview {
  font-size: 13px;
  color: #999;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.rm-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
  flex-shrink: 0;
}
.rm-time { font-size: 11px; color: #bbb; }
.rm-unread {
  background: #e84040;
  color: #fff;
  font-size: 11px;
  font-weight: 700;
  padding: 1px 6px;
  border-radius: 100px;
  min-width: 18px;
  text-align: center;
}


/* ══════════════════════════════════════
   S3  채팅방 (카카오톡)
══════════════════════════════════════ */
#s3 {
  background: #b2c7d9;
  position: relative;
}

.chat-header {
  background: #b2c7d9;
  padding: 50px 6px 10px;
  display: flex;
  align-items: center;
  gap: 2px;
  flex-shrink: 0;
}

.ch-back {
  font-size: 24px;
  background: none;
  border: none;
  cursor: pointer;
  color: #111;
  padding: 4px 6px;
  line-height: 1;
  flex-shrink: 0;
}

.ch-avatar {
  width: 34px; height: 34px;
  border-radius: 50%;
  background: #c9d6e3;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px;
  flex-shrink: 0;
}

.ch-name-wrap { flex: 1; margin-left: 6px; }
.ch-name { font-size: 15px; font-weight: 700; color: #111; }

.ch-icons { display: flex; }
.ch-icon-btn {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  background: none; border: none;
  cursor: default; border-radius: 50%; color: #333;
}

/* BUBBLES */
.bubbles {
  flex: 1;
  overflow-y: auto;
  padding: 14px 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.bgroup { display: flex; align-items: flex-end; gap: 6px; }
.bgroup.me { flex-direction: row-reverse; }

.b-avatar {
  width: 36px; height: 36px;
  border-radius: 10px;
  background: #fde0e0;
  font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  align-self: flex-start;
}

.b-col { display: flex; flex-direction: column; }
.bgroup.me .b-col { align-items: flex-end; }

.b-sender { font-size: 11px; color: rgba(0,0,0,0.45); margin-bottom: 3px; margin-left: 2px; }

.b-row { display: flex; align-items: flex-end; gap: 4px; }
.bgroup.me .b-row { flex-direction: row-reverse; }

.bubble {
  padding: 9px 13px;
  font-size: 13.5px;
  line-height: 1.5;
  max-width: 210px;
  word-break: break-word;
}
.bubble.them {
  background: #fff;
  border-radius: 2px 14px 14px 14px;
  color: #111;
}
.bubble.me {
  background: #fee500;
  border-radius: 14px 2px 14px 14px;
  color: #111;
}

.b-time { font-size: 10px; color: rgba(0,0,0,0.38); flex-shrink: 0; margin-bottom: 2px; }

/* 전송 경고 팝업 */
.send-popup {
  position: absolute;
  top: 45%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.92);
  background: rgba(0,0,0,0.72);
  color: #fff;
  padding: 13px 20px;
  border-radius: 14px;
  font-size: 13px;
  text-align: center;
  backdrop-filter: blur(10px);
  z-index: 20;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s, transform 0.2s;
  white-space: nowrap;
}
.send-popup.show {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
}

/* INPUT BAR */
.input-bar {
  background: #fff;
  min-height: 55px;
  padding: 10px 16px;
  display: flex;
  align-items: center;
  flex-shrink: 0;
}

.msg-field {
  flex: 1;
  background: transparent;
  border: none;
  font-size: 14px;
  font-family: 'Noto Sans KR', sans-serif;
  outline: none;
  resize: none;
  line-height: 1.5;
  max-height: 80px;
  overflow-y: auto;
  color: #111;
}
.msg-field::placeholder { color: #aaa; }

/* TOOLBAR */
.toolbar {
  background: #fff;
  border-top: 0.5px solid #eee;
  min-height: 56px;
  display: flex;
  align-items: center;
  padding: 6px 16px 12px; /* 오른쪽(두 번째 값)을 16px로 키웠습니다 */
  flex-shrink: 0;
  box-sizing: border-box;
}

.tool-left {
  display: flex;
  align-items: center;
  gap: 0px;
  flex: 1;
}

.tool-right {
  display: flex;
  align-items: center;
}

.tool-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  padding: 2px 7px 0;
  background: none;
  border: none;
  cursor: pointer;
  border-radius: 8px;
  font-family: 'Noto Sans KR', sans-serif;
  transition: background 0.15s;
  position: relative;
}
.tool-btn:hover { background: #f5f5f5; }

.tool-icon { font-size: 20px; line-height: 1; }
.tool-label { font-size: 8px; color: #888; }

/* 전송 버튼 기본 스타일 (회색) */
.send-btn {
  width: 32px; height: 32px;
  background: #f0f0f0; /* 기본 회색 */
  border: none; border-radius: 50%;
  font-size: 15px; 
  color: #ccc; /* 화살표 색상도 연하게 */
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all 0.2s; /* 부드러운 색상 전환 */
}

/* 메시지 입력 시 활성화될 주황색 스타일 추가 */
.send-btn.active {
  background: #ff9500; /* 주황색 */
  color: #fff; /* 화살표 흰색 */
}

.send-btn:hover { background: #e0e0e0; }

.tool-btn.pulsing svg {
  animation: t-pulse 0.75s ease-in-out infinite;
}
@keyframes t-pulse {
  0%,100% { transform: scale(1); filter: none; }
  50% { transform: scale(1.2); filter: drop-shadow(0 0 6px rgba(232,160,160,0.75)); }
}


/* ══════════════════════════════════════
   분석 패널
══════════════════════════════════════ */
.a-panel {
  position: absolute;
  left: 0; right: 0; bottom: 0;
  background: #fff;
  border-radius: 22px 22px 0 0;
  box-shadow: 0 -6px 30px rgba(0,0,0,0.14);
  transform: translateY(100%);
  transition: transform 0.38s cubic-bezier(0.32, 0.72, 0, 1);
  z-index: 30;
  display: flex;
  flex-direction: column;
  max-height: 72%;
}
.a-panel.open { transform: translateY(0); }

.a-handle {
  width: 38px; height: 4px;
  background: #e0e0e0;
  border-radius: 2px;
  margin: 10px auto 0;
  flex-shrink: 0;
  cursor: pointer;
}

.a-body {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
}

.a-loading {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 0;
  font-size: 13px;
  color: #888;
}
.dots span {
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #e8a0a0;
  animation: bdot 1.2s infinite ease-in-out;
}
.dots span:nth-child(2) { animation-delay: .2s; }
.dots span:nth-child(3) { animation-delay: .4s; }
@keyframes bdot {
  0%,60%,100% { transform: translateY(0); opacity: .3; }
  30% { transform: translateY(-7px); opacity: 1; }
}

.a-result { display: none; }
.a-result.show { display: block; }

.a-section-lbl {
  font-size: 11px;
  font-weight: 700;
  color: #bbb;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 12px;
}

.emo-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.emo-name { font-size: 12px; color: #666; width: 56px; flex-shrink: 0; }
.emo-track {
  flex: 1; height: 7px;
  background: #f0f0f0;
  border-radius: 10px;
  overflow: hidden;
}
.emo-bar { height: 100%; border-radius: 10px; width: 0; transition: width 1.1s ease; }
.emo-pct { font-size: 12px; font-weight: 500; color: #555; width: 30px; text-align: right; flex-shrink: 0; }

.risk-chip {
  display: flex;
  align-items: center;
  gap: 6px;
  background: #fff5f5;
  border: 1px solid rgba(220,50,50,0.15);
  border-radius: 12px;
  padding: 10px 14px;
  margin: 14px 0 12px;
}
.risk-main { font-size: 13px; font-weight: 700; color: #d83030; }
.risk-sep { color: #d83030; opacity: 0.5; }
.risk-score { font-size: 12px; color: #d83030; opacity: 0.75; }

.a-comment {
  font-size: 13px;
  color: #555;
  line-height: 1.75;
  background: #fafafa;
  border-radius: 10px;
  padding: 12px 14px;
}

.a-actions {
  display: flex;
  gap: 8px;
  padding: 12px 20px 22px;
  border-top: 1px solid #f0f0f0;
  flex-shrink: 0;
}

.btn-hold {
  flex: 1; padding: 13px;
  border-radius: 10px;
  background: #f5f5f5;
  border: 1px solid #e0e0e0;
  color: #555; font-size: 13px; font-weight: 500;
  font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer; transition: background 0.2s;
}
.btn-hold:hover { background: #eee; }

.btn-anyway {
  flex: 1; padding: 13px;
  border-radius: 10px;
  background: #e8a0a0; border: none;
  color: #fff; font-size: 13px; font-weight: 700;
  font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer; transition: background 0.2s;
}
.btn-anyway:hover { background: #f0b0b0; }

/* TOAST */
.toast {
  position: fixed;
  bottom: 44px; left: 50%;
  transform: translateX(-50%) translateY(18px);
  background: rgba(0,0,0,0.78);
  color: #fff;
  padding: 11px 22px;
  border-radius: 100px;
  font-size: 13px;
  opacity: 0;
  transition: all 0.28s;
  z-index: 200;
  pointer-events: none;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

::-webkit-scrollbar { width: 0; }
</style>
</head>
<body>

<div class="device">

  <!-- ─────────── S1: 온보딩 ─────────── -->
  <div id="s1" class="stage active">
    <div class="s1-inner">
      <div class="s1-logo">자니..?</div>
      <p class="s1-title">보호할 대상을<br>등록하세요</p>
      <div class="s1-tabs">
        <div class="s1-tab on" onclick="setTab(this,'kakao')">카카오톡</div>
        <div class="s1-tab"   onclick="setTab(this,'insta')">인스타그램</div>
      </div>
      <input id="contactInput" class="s1-input" type="text" placeholder="010-1111-1111"
        onkeydown="if(event.key==='Enter')register()">
      <button class="s1-btn" onclick="register()">등록하기</button>
    </div>
  </div>

  <!-- ─────────── S2: 채팅 목록 ─────────── -->
  <div id="s2" class="stage">
    <div class="kk-sidebar">
      <div class="sb-item on">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </div>
      <div class="sb-item">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>
      <div class="sb-item">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      </div>
      <div class="sb-item">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
      </div>
    </div>
    <div class="kk-content">
      <div class="kk-top">
        <div class="kk-top-row">
          <div class="kk-heading">채팅</div>
          <div class="kk-icons">
            <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#444" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg>
            <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#444" stroke-width="2.2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </div>
        </div>
        <div class="kk-tabs">
          <div class="kk-tab on">채팅</div>
          <div class="kk-tab">오픈채팅</div>
        </div>
      </div>
      <div class="room-list">
        <div class="room-row">
          <div class="rm-avatar av-blue">🧑</div>
          <div class="rm-info">
            <div class="rm-name-row"><span class="rm-name">동현</span></div>
            <div class="rm-preview">ㅋㅋ 맞지 그게 말이 되냐</div>
          </div>
          <div class="rm-right"><span class="rm-time">오후 10:12</span></div>
        </div>
        <div class="room-row">
          <div class="rm-avatar av-peach">👩</div>
          <div class="rm-info">
            <div class="rm-name-row"><span class="rm-name">수민</span></div>
            <div class="rm-preview">나중에 연락해 지금 바빠</div>
          </div>
          <div class="rm-right"><span class="rm-time">오후 8:44</span></div>
        </div>
        <div class="room-row tappable protected-row" onclick="openRoom()">
          <div class="rm-avatar av-pink">💔</div>
          <div class="rm-info">
            <div class="rm-name-row">
              <span class="rm-name" id="protectedLabel">—</span>
              <span class="warn-badge">⚠️ 보호중</span>
            </div>
            <div class="rm-preview">그냥 연락하지 마</div>
          </div>
          <div class="rm-right">
            <span class="rm-time">오전 2:13</span>
            <span class="rm-unread">1</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ─────────── S3: 채팅방 ─────────── -->
  <div id="s3" class="stage">

    <div class="chat-header">
      <button class="ch-back" onclick="show('s2')">‹</button>
      <div class="ch-avatar">💔</div>
      <div class="ch-name-wrap">
        <div class="ch-name" id="roomName">—</div>
      </div>
      <div class="ch-icons">
        <button class="ch-icon-btn">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg>
        </button>
        <button class="ch-icon-btn">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a9 9 0 0 1 9 9c0 3-1.5 5.5-4 7l1 3-4-1a9 9 0 1 1-2-17.9"/></svg>
        </button>
        <button class="ch-icon-btn">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2.2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
      </div>
    </div>

    <div class="bubbles">
      <div class="bgroup">
        <div class="b-avatar">💔</div>
        <div class="b-col">
          <div class="b-sender" id="senderName1">—</div>
          <div class="b-row">
            <div class="bubble them">그냥 연락하지 마</div>
            <span class="b-time">오전 2:00</span>
          </div>
        </div>
      </div>
      <div class="bgroup me">
        <div class="b-col">
          <div class="b-row">
            <span class="b-time">오전 2:01</span>
            <div class="bubble me">미안해. 한 번만 얘기하자</div>
          </div>
        </div>
      </div>
      <div class="bgroup">
        <div class="b-avatar">💔</div>
        <div class="b-col">
          <div class="b-sender" id="senderName2">—</div>
          <div class="b-row">
            <div class="bubble them">할 말 없어</div>
            <span class="b-time">오전 2:02</span>
          </div>
        </div>
      </div>
    </div>

    <div class="send-popup" id="sendPopup">⚠️ 잠깐, 보내기 전에 감정 분석 해보세요</div>

    <div class="input-bar">
      <textarea class="msg-field" id="msgField" rows="1" placeholder="메시지 입력"
        oninput="autoResize(this)"></textarea>
    </div>

    <div class="toolbar">
      <div class="tool-left">
        <button class="tool-btn">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
        <button class="tool-btn" style="position:relative;">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M8.5 14s1.5 2 3.5 2 3.5-2 3.5-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
          <span style="position:absolute;top:3px;right:3px;width:6px;height:6px;background:#e84040;border-radius:50%;"></span>
        </button>
        <button class="tool-btn" id="analyzeBtn" onclick="startAnalysis()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#e8a0a0" stroke-width="2" stroke-linecap="round"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/><path d="M9 9h.01M15 9h.01M8 13s1.5 2.5 4 2.5 4-2.5 4-2.5"/></svg>
          <span class="tool-label">감정분석</span>
        </button>
        <button class="tool-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="12" y2="17"/></svg>
          <span class="tool-label">보류함</span>
        </button>
      </div>
      <div class="tool-right">
        <button class="send-btn" onclick="handleSend()">↑</button>
      </div>
    </div>

    <!-- 감정분석 패널 -->
    <div class="a-panel" id="aPanel">
      <div class="a-handle" onclick="closePanel()"></div>
      <div class="a-body">
        <div class="a-loading" id="aLoading">
          <div class="dots"><span></span><span></span><span></span></div>
          <span id="loadTxt">AI 분석 중...</span>
        </div>
        <div class="a-result" id="aResult">
          <div class="a-section-lbl">감정 분석</div>
          <div id="emoBars"></div>
          <div class="risk-chip">
            <span id="riskIcon" style="font-size:16px">🔴</span>
            <span class="risk-main" id="riskMain">위험</span>
            <span class="risk-sep">·</span>
            <span class="risk-score" id="riskScoreEl">전송 리스크 87점</span>
          </div>
          <div class="a-comment" id="aComment">지금 이 메시지, 내일 아침엔 후회할 거예요</div>
        </div>
      </div>
      <div class="a-actions" id="aActions" style="display:none">
        <button class="btn-hold"   onclick="doHold()">보류하기</button>
        <button class="btn-anyway" onclick="doAnyway()">그래도 전송</button>
      </div>
    </div>

  </div><!-- /s3 -->
</div><!-- /device -->

<div class="toast" id="toast"></div>

<script>
const DUMMY = { 미련:70, 외로움:15, 불안:8, 분노:4, 확인욕구:3 };
const EMO_COLOR = {
  미련:'#e8a0a0', 외로움:'#b8a8d4', 불안:'#a0c4e8', 분노:'#e8b0a0', 확인욕구:'#a8d4b8'
};
const RISK_ICON = { 안전:'🟢', 주의:'🟡', 위험:'🔴' };
const DEFAULT_COMMENT = '지금 이 메시지, 내일 아침엔 후회할 거예요';

let platform = 'kakao';
let contact  = '';

function setTab(el, p) {
  platform = p;
  document.querySelectorAll('.s1-tab').forEach(t => t.classList.remove('on'));
  el.classList.add('on');
  const ph = p === 'kakao' ? '010-1111-1111' : '@username';
  const inp = document.getElementById('contactInput');
  inp.placeholder = ph;
  inp.value = '';
}

function show(id) {
  document.querySelectorAll('.stage').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function register() {
  const val = document.getElementById('contactInput').value.trim();
  if (!val) { document.getElementById('contactInput').focus(); return; }
  contact = val;
  document.getElementById('protectedLabel').textContent = val;
  document.getElementById('roomName').textContent       = val;
  document.getElementById('senderName1').textContent   = val;
  document.getElementById('senderName2').textContent   = val;
  show('s2');
}

function openRoom() {
  closePanel();
  document.getElementById('msgField').value = '';
  document.getElementById('analyzeBtn').classList.remove('pulsing');
  show('s3');
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 80) + 'px';

  // 2. 버튼 활성화 로직 추가
  const sendBtn = document.querySelector('.send-btn');
  if (el.value.trim().length > 0) {
    sendBtn.classList.add('active'); // 글자가 있으면 주황색
  } else {
    sendBtn.classList.remove('active'); // 비어있으면 다시 회색
  }
}

function handleSend() {
  if (!document.getElementById('msgField').value.trim()) return;
  const popup = document.getElementById('sendPopup');
  popup.classList.add('show');
  document.getElementById('analyzeBtn').classList.add('pulsing');
  setTimeout(() => {
    popup.classList.remove('show');
    document.getElementById('analyzeBtn').classList.remove('pulsing');
  }, 2000);
}

async function startAnalysis() {
  const msg = document.getElementById('msgField').value.trim();
  if (!msg) { showToast('메시지를 먼저 입력해주세요'); return; }

  const loading = document.getElementById('aLoading');
  const result  = document.getElementById('aResult');
  const actions = document.getElementById('aActions');

  loading.style.display = 'flex';
  result.classList.remove('show');
  actions.style.display = 'none';
  document.getElementById('aPanel').classList.add('open');
  document.getElementById('analyzeBtn').classList.remove('pulsing');

  const texts = ['AI 분석 중...', '감정 패턴 스캔 중...', '리스크 계산 중...'];
  let ti = 0;
  const ticker = setInterval(() => {
    document.getElementById('loadTxt').textContent = texts[++ti % texts.length];
  }, 900);

  let data = null;
  try {
    const res = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg }),
    });
    const body = await res.json();
    if (!res.ok) throw new Error(body.error || '분석 실패');
    data = body;
  } catch (err) {
    console.error(err);
    showToast(err.message || '분석에 실패했어요. 예시 결과를 보여드릴게요');
    data = {
      emotions: DUMMY,
      riskScore: 87,
      riskLevel: '위험',
      comment: DEFAULT_COMMENT,
    };
  } finally {
    clearInterval(ticker);
    loading.style.display = 'none';
    renderResult(data);
  }
}

function renderResult(data) {
  const emotions = data?.emotions || DUMMY;
  const riskScore = data?.riskScore ?? 87;
  const riskLevel = data?.riskLevel || '위험';
  const comment = data?.comment || DEFAULT_COMMENT;

  document.getElementById('riskIcon').textContent = RISK_ICON[riskLevel] || '🔴';
  document.getElementById('riskMain').textContent = riskLevel;
  document.getElementById('riskScoreEl').textContent = '전송 리스크 ' + riskScore + '점';
  document.getElementById('aComment').textContent = comment;

  const barsEl = document.getElementById('emoBars');
  barsEl.innerHTML = '';

  Object.entries(emotions).forEach(([name, pct], idx) => {
    const row = document.createElement('div');
    row.className = 'emo-row';
    row.innerHTML =
      `<span class="emo-name">${name}</span>` +
      `<div class="emo-track"><div class="emo-bar" style="background:${EMO_COLOR[name] || '#b8a8d4'}"></div></div>` +
      `<span class="emo-pct">0%</span>`;
    barsEl.appendChild(row);

    requestAnimationFrame(() => {
      const bar   = row.querySelector('.emo-bar');
      const pctEl = row.querySelector('.emo-pct');
      setTimeout(() => {
        bar.style.width = pct + '%';
        let cur = 0;
        const iv = setInterval(() => {
          cur = Math.min(cur + pct / 30, pct);
          pctEl.textContent = Math.round(cur) + '%';
          if (cur >= pct) clearInterval(iv);
        }, 33);
      }, 80 + idx * 60);
    });
  });

  document.getElementById('aResult').classList.add('show');
  document.getElementById('aActions').style.display = 'flex';
}

function closePanel() {
  document.getElementById('aPanel').classList.remove('open');
}

function doHold() {
  closePanel();
  showToast('메시지가 보류함에 저장됐어요 🌙');
}

function doAnyway() {
  closePanel();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
